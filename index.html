<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>AR – Hotspot Triggered Animation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>

    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            height: 100%;
        }

        /* CLICK POINT */

        .hotspot {
            width: 24px;
            height: 24px;
            background: red;
            border-radius: 50%;
            border: 2px solid white;
            pointer-events: auto;
            cursor: pointer;
            animation: pulse 1.3s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 0, 0, .6);
            }
            70% {
                transform: scale(1.5);
                box-shadow: 0 0 0 20px rgba(255, 0, 0, 0);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <model-viewer id="viewer" src="modle.glb" ar ar-modes="scene-viewer webxr quick-look" camera-controls interaction-prompt="none" exposure="1" environment-image="neutral">

        <div slot="hotspot-1" class="hotspot" data-position="0 1.6 0" data-normal="0 1 0" id="playPoint">
        </div>

    </model-viewer>

    <script>
        const viewer = document.getElementById("viewer");
        const playPoint = document.getElementById("playPoint");

        let playing = false;
        const ANIMATION_NAME = "Fly"; // 🔴 CHANGE THIS if needed

        viewer.addEventListener("load", () => {
            console.log("Animations:", viewer.availableAnimations);
            viewer.pause();
            viewer.currentTime = 0;
        });

        playPoint.addEventListener("pointerdown", (e) => {
            e.stopPropagation();
            if (playing) return;

            playing = true;
            viewer.animationName = ANIMATION_NAME;
            viewer.currentTime = 0;
            viewer.play();

            // stop after animation duration if needed
            setTimeout(() => {
                viewer.pause();
                playing = false;
            }, 4000);
        });

        /* AR SAFETY */
        viewer.addEventListener("ar-status", () => {
            viewer.pause();
            viewer.currentTime = 0;
            playing = false;
        });
    </script>

</body>

</html>
