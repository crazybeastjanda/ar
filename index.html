<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Experience Hub | Discover 3D Models</title>
    
    <!-- Model Viewer CDN -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap');

        :root {
            --primary: #ee3124;
            --primary-hover: #c4261c;
            --bg-light: #ffffff;
            --bg-dark: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header Styles */
        header {
            text-align: center;
            margin-bottom: 4rem;
            padding-top: 2rem;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--primary);
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Landing Section */
        #landing {
            transition: opacity 0.5s ease;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
            padding: 1rem 0;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            cursor: default;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            border-color: var(--primary);
        }

        .card-image {
            width: 100%;
            height: 280px;
            background: #f1f5f9;
            position: relative;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .card-image img {
            transform: scale(1.05);
        }

        .card-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        .model-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .model-info {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .enter-ar-btn {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .enter-ar-btn:hover {
            background: var(--primary-hover);
        }

        /* Viewer Section */
        #viewer-section {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .viewer-header {
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            border-bottom: 1px solid var(--border-color);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.625rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: #f1f5f9;
        }

        .viewer-container {
            flex-grow: 1;
            position: relative;
        }

        model-viewer {
            width: 100%;
            height: 100%;
        }

        /* Loading Overlay */
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f1f5f9;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #status-message {
            position: absolute;
            top: 50%;
            width: 100%;
            text-align: center;
            color: #ee3124;
            font-weight: 600;
            padding: 20px;
            display: none;
            z-index: 11;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <!-- Landing Section -->
    <section id="landing">
        <div class="container">
            <header>
                <h1>AR Experience Hub</h1>
                <p class="subtitle">Discover our premium collection of 3D models and experience them in your world with Augmented Reality.</p>
            </header>

            <div class="card-grid" id="card-grid">
                <!-- Cards will be dynamically injected here -->
            </div>
        </div>
    </section>

    <!-- AR Viewer Section -->
    <section id="viewer-section" class="hidden">
        <div class="viewer-header">
            <button id="back-btn" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back
            </button>
            <h3 id="viewer-model-title" style="margin: 0;">Model Name</h3>
            <div style="width: 60px;"></div>
        </div>

        <div class="viewer-container">
            <div id="loading-overlay">
                <div class="spinner"></div>
                <p>Loading 3D Experience...</p>
            </div>
            
            <div id="status-message"></div>

            <model-viewer 
                id="viewer" 
                src="" 
                ar 
                ar-modes="scene-viewer webxr quick-look" 
                camera-controls 
                interaction-prompt="none" 
                exposure="1" 
                environment-image="neutral"
                autoplay
            ></model-viewer>
        </div>
    </section>

    <script>
        // Model Data
        const models = [
            { id: "model1", name: "Futuristic Car", file: "assets/model1.glb", image: "assets/car.png", desc: "A sleek, next-generation racing machine." },
            { id: "model2", name: "Minimalist Chair", file: "assets/model2.glb", image: "assets/chair.png", desc: "An elegant, architectural seating piece." },
            { id: "model3", name: "Robot Buddy", file: "assets/model3.glb", image: "assets/robot.png", desc: "A friendly and capable robotic assistant." }
        ];

        // DOM Elements
        const landing = document.getElementById('landing');
        const viewerSection = document.getElementById('viewer-section');
        const cardGrid = document.getElementById('card-grid');
        const modelViewer = document.getElementById('viewer');
        const modelTitle = document.getElementById('viewer-model-title');
        const backBtn = document.getElementById('back-btn');
        const loadingOverlay = document.getElementById('loading-overlay');
        const statusMessage = document.getElementById('status-message');

        // Initialize Cards
        function initApp() {
            cardGrid.innerHTML = models.map(model => `
                <div class="card">
                    <div class="card-image">
                        <img src="${model.image}" alt="${model.name}">
                    </div>
                    <div class="card-content">
                        <h3 class="model-name">${model.name}</h3>
                        <p class="model-info">${model.desc}</p>
                        <button class="enter-ar-btn" onclick="openViewer('${model.id}')">Enter AR Mode</button>
                    </div>
                </div>
            `).join('');

            // Setup Navigation
            backBtn.onclick = closeViewer;

            // Handle browser back/forward
            window.onpopstate = (e) => {
                if (e.state && e.state.view === 'viewer') {
                    openViewer(e.state.id, false);
                } else {
                    closeViewer(false);
                }
            };
        }

        function openViewer(id, pushState = true) {
            const model = models.find(m => m.id === id);
            if (!model) return;

            landing.classList.add('hidden');
            viewerSection.classList.remove('hidden');
            
            loadingOverlay.classList.remove('hidden');
            statusMessage.style.display = 'none';

            modelTitle.textContent = model.name;
            modelViewer.src = model.file;
            
            if (pushState) {
                history.pushState({view: 'viewer', id: id}, model.name, `#${id}`);
            }
        }

        function closeViewer(pushState = true) {
            landing.classList.remove('hidden');
            viewerSection.classList.add('hidden');
            modelViewer.src = '';

            if (pushState) {
                history.pushState({view: 'landing'}, 'Home', window.location.pathname);
            }
        }

        // Model Viewer Event Listeners
        modelViewer.addEventListener('load', () => {
            loadingOverlay.classList.add('hidden');
            console.log("Model loaded successfully");
        });

        modelViewer.addEventListener('error', (e) => {
            loadingOverlay.classList.add('hidden');
            statusMessage.style.display = 'block';
            statusMessage.textContent = `Error: Could not load the model. Please ensure ${modelViewer.src} exists and you are using a local server.`;
            console.error("Model Error:", e);
        });

        // Initialize on DOM load
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
